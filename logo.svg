  <line x1="74" y1="30" x2="74" y2="44" stroke="#FF9A2E" stroke-width="1"/>
  <line x1="67" y1="37" x2="81" y2="37" stroke="#FF9A2E" stroke-width="1"/>
  <line x1="69" y1="32" x2="79" y2="42" stroke="#FF9A2E" stroke-width="0.8"/>
