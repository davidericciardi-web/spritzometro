  <path d="M48 32 L42 68 L78 68 L72 32 Z" fill="none" stroke="#fff" stroke-width="2.5" stroke-linejoin="round"/>
  <line x1="60" y1="68" x2="60" y2="78" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="78" x2="70" y2="78" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>

