<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpritzoMetro — Il Prezzo dello Spritz in Italia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg:        #0e0e0f;
      --surface:   #161618;
      --surface2:  #1e1e21;
      --border:    #2a2a2e;
      --text:      #f0ede8;
      --muted:     #7a7880;
      --accent:    #e8a045;
      --accent2:   #c45c2e;
      --green:     #4caf7d;
      --orange:    #e8a045;
      --red:       #e05252;
      --font-display: 'Playfair Display', serif;
      --font-mono:    'DM Mono', monospace;
      --font-body:    'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      height: 58px;
      background: rgba(14,14,15,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 20px;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 22px;
      color: var(--accent);
      letter-spacing: -0.5px;
      white-space: nowrap;
    }

    .logo span {
      color: var(--text);
      font-style: italic;
    }

    .header-stats {
      display: flex;
      gap: 20px;
      margin-left: auto;
    }

    .stat-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 14px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .stat-pill b { color: var(--accent); font-weight: 500; }

    .live-dot {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      height: 100vh;
      padding-top: 58px;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 360px;
      min-width: 360px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-top {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px 9px 36px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap input:focus { border-color: var(--accent); }

    .search-icon {
      position: absolute;
      left: 11px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
    }

    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 11px;
      color: var(--muted);
      font-size: 11px;
      font-family: var(--font-mono);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0e0e0f;
    }

    .sort-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sort-row label {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono);
      white-space: nowrap;
    }

    .sort-row select {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      color: var(--text);
      font-size: 12px;
      font-family: var(--font-mono);
      outline: none;
      cursor: pointer;
    }

    /* ── BAR LIST ── */
    .bar-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .bar-list::-webkit-scrollbar { width: 4px; }
    .bar-list::-webkit-scrollbar-track { background: transparent; }
    .bar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .bar-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bar-card:hover {
      border-color: var(--accent);
      background: rgba(232,160,69,0.05);
      transform: translateX(2px);
    }

    .bar-card.active {
      border-color: var(--accent);
      background: rgba(232,160,69,0.08);
    }

    .price-badge {
      min-width: 52px;
      text-align: center;
      background: var(--bg);
      border-radius: 8px;
      padding: 6px 8px;
      border: 1px solid var(--border);
    }

    .price-badge .amount {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 500;
      line-height: 1;
    }

    .price-badge .unit {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--muted);
      margin-top: 2px;
    }

    .price-badge.green .amount { color: var(--green); }
    .price-badge.orange .amount { color: var(--orange); }
    .price-badge.red .amount { color: var(--red); }

    .bar-info { flex: 1; min-width: 0; }

    .bar-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .bar-meta {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bar-rank {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      min-width: 20px;
      text-align: right;
    }

    .no-results {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── CONTRIBUTE SECTION ── */
    .contribute-section {
      border-top: 1px solid var(--border);
      padding: 12px;
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-family: var(--font-body);
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      text-align: center;
    }

    .btn-primary {
      background: var(--accent);
      color: #0e0e0f;
    }

    .btn-primary:hover { background: #f0b060; }

    .btn-secondary {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    /* ── MAP ── */
    #map {
      flex: 1;
      background: var(--bg);
      z-index: 1;
    }

    /* Leaflet dark tiles override */
    .leaflet-tile { filter: brightness(0.7) saturate(0.6) hue-rotate(180deg) invert(1); }
    .leaflet-container { background: var(--bg); }

    /* Custom popup */
    .leaflet-popup-content-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      padding: 0;
    }

    .leaflet-popup-content { margin: 0; }
    .leaflet-popup-tip { background: var(--surface); }

    .popup-inner {
      padding: 14px 16px;
      min-width: 200px;
    }

    .popup-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 6px;
      color: var(--text);
    }

    .popup-price {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .popup-price.green { color: var(--green); }
    .popup-price.orange { color: var(--orange); }
    .popup-price.red { color: var(--red); }

    .popup-meta {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono);
      margin-bottom: 10px;
    }

    .popup-source {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--muted);
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 420px;
      max-width: calc(100vw - 40px);
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      transform: translateY(20px);
      transition: transform 0.2s;
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-family: var(--font-display);
      font-size: 20px;
      color: var(--accent);
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 2px;
      transition: color 0.15s;
    }

    .modal-close:hover { color: var(--text); }

    .modal-body { padding: 20px 24px 24px; }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus { border-color: var(--accent); }

    .form-input::placeholder,
    .form-textarea::placeholder { color: var(--muted); }

    .form-textarea { resize: vertical; min-height: 80px; }

    .form-submit {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #0e0e0f;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }

    .form-submit:hover { background: #f0b060; }

    .form-success {
      text-align: center;
      padding: 20px;
      color: var(--green);
      font-size: 14px;
      display: none;
    }

    /* ── LOADING ── */
    .loading-bar {
      position: fixed;
      top: 58px;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      z-index: 999;
      transform-origin: left;
      animation: loadprogress 1.5s ease-in-out infinite;
      display: none;
    }

    .loading-bar.active { display: block; }

    @keyframes loadprogress {
      0% { transform: scaleX(0); opacity: 1; }
      70% { transform: scaleX(0.8); opacity: 1; }
      100% { transform: scaleX(1); opacity: 0; }
    }

    /* ── LEGEND ── */
    .map-legend {
      position: absolute;
      bottom: 24px;
      right: 16px;
      z-index: 500;
      background: rgba(22,22,24,0.92);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }

    .legend-title {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text);
      margin-bottom: 5px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .empty-state {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 100;
      pointer-events: none;
    }

    .empty-state h2 {
      font-family: var(--font-display);
      font-size: 28px;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .empty-state p {
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 700px) {
      .sidebar { width: 100%; min-width: unset; position: fixed; bottom: 0; left: 0; right: 0; height: 50vh; z-index: 500; border-right: none; border-top: 1px solid var(--border); }
      #map { height: 50vh; }
      .layout { flex-direction: column; }
      .header-stats { display: none; }
    }
  </style>
</head>
<body>

<!-- Loading bar -->
<div class="loading-bar" id="loadingBar"></div>

<!-- Header -->
<header>
  <div class="logo">Spritzo<span>Metro</span></div>
  <div class="header-stats">
    <div class="stat-pill">
      <div class="live-dot"></div>
      LIVE
    </div>
    <div class="stat-pill">🍊 Bars: <b id="totalBars">—</b></div>
    <div class="stat-pill">📍 Città: <b id="totalCities">—</b></div>
    <div class="stat-pill">⌀ Media: <b id="avgPrice">—</b></div>
  </div>
</header>

<!-- Main layout -->
<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Cerca un bar..." />
      </div>
      <div class="filters" id="cityFilters">
        <button class="filter-btn active" data-city="all">Tutti</button>
      </div>
      <div class="sort-row">
        <label>Ordina:</label>
        <select id="sortSelect">
          <option value="price_asc">Prezzo ↑</option>
          <option value="price_desc">Prezzo ↓</option>
          <option value="name_asc">Nome A–Z</option>
          <option value="recent">Più recenti</option>
        </select>
      </div>
    </div>

    <div class="bar-list" id="barList">
      <div class="no-results">Caricamento in corso...</div>
    </div>

    <div class="contribute-section">
      <button class="btn btn-primary" onclick="openModal('contribute')">+ Aggiungi Prezzo</button>
      <button class="btn btn-secondary" onclick="openModal('claim')">Sei il proprietario?</button>
    </div>
  </div>

  <!-- Map -->
  <div style="flex:1; position:relative;">
    <div id="map"></div>
    <div class="map-legend">
      <div class="legend-title">Prezzo Spritz</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Economico (< €4)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div> Medio (€4–€6)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> Caro (> €6)</div>
    </div>
  </div>
</div>

<!-- Contribute Modal -->
<div class="modal-overlay" id="contributeModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Aggiungi un Prezzo</div>
      <button class="modal-close" onclick="closeModal('contribute')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Nome del Bar *</label>
        <input type="text" class="form-input" id="c_barName" placeholder="Es. Bar Centrale" />
      </div>
      <div class="form-group">
        <label class="form-label">Città *</label>
        <select class="form-select" id="c_city">
          <option value="">Seleziona città...</option>
          <option>Milano</option>
          <option>Roma</option>
          <option>Napoli</option>
          <option>Venezia</option>
          <option>Firenze</option>
          <option>Torino</option>
          <option>Bologna</option>
          <option>Altra</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Prezzo Spritz (€) *</label>
        <input type="number" class="form-input" id="c_price" placeholder="Es. 4.50" step="0.5" min="1" max="20" />
      </div>
      <div class="form-group">
        <label class="form-label">Indirizzo (opzionale)</label>
        <input type="text" class="form-input" id="c_address" placeholder="Es. Via Roma 12" />
      </div>
      <div class="form-group">
        <label class="form-label">Note (opzionale)</label>
        <textarea class="form-textarea" id="c_notes" placeholder="Es. happy hour, tipo di spritz..."></textarea>
      </div>
      <button class="form-submit" onclick="submitContribute()">Invia Prezzo 🍊</button>
      <div class="form-success" id="c_success">✅ Grazie! Il tuo contributo è stato ricevuto.</div>
    </div>
  </div>
</div>

<!-- Claim Modal -->
<div class="modal-overlay" id="claimModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Sei il Proprietario?</div>
      <button class="modal-close" onclick="closeModal('claim')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Nome del Bar *</label>
        <input type="text" class="form-input" id="cl_barName" placeholder="Nome esatto del bar" />
      </div>
      <div class="form-group">
        <label class="form-label">Il tuo nome *</label>
        <input type="text" class="form-input" id="cl_ownerName" placeholder="Nome e cognome" />
      </div>
      <div class="form-group">
        <label class="form-label">Email *</label>
        <input type="email" class="form-input" id="cl_email" placeholder="email@esempio.it" />
      </div>
      <div class="form-group">
        <label class="form-label">Telefono</label>
        <input type="tel" class="form-input" id="cl_phone" placeholder="+39 ..." />
      </div>
      <div class="form-group">
        <label class="form-label">Messaggio</label>
        <textarea class="form-textarea" id="cl_message" placeholder="Descrivi il tuo bar o aggiorna il prezzo..."></textarea>
      </div>
      <button class="form-submit" onclick="submitClaim()">Richiedi Ownership 🏪</button>
      <div class="form-success" id="cl_success">✅ Richiesta inviata! Ti contatteremo presto.</div>
    </div>
  </div>
</div>

<script>
  
    
// ── CONFIG — apni Supabase details daalo ──
const SUPABASE_URL = 'https://wkaeyssmfwkefxjhsgav.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndrYWV5c3NtZndrZWZ4amhzZ2F2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjUxMzAsImV4cCI6MjA5MTY0MTEzMH0.lgq4S5Oexr5aNn2Zswo-8uqH--vFSiJmDNkAbHsFmlY';

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── STATE ──
let allBars = [];
let filteredBars = [];
let activeCity = 'all';
let activeBarId = null;
let markers = {};
let map;

// ── INIT MAP ──
function initMap() {
  map = L.map('map', {
    center: [42.5, 12.5],
    zoom: 6,
    zoomControl: true,
    attributionControl: false
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18
  }).addTo(map);
}

// ── PRICE COLOR ──
function priceColor(price) {
  if (!price) return '#7a7880';
  if (price < 4) return '#4caf7d';
  if (price <= 6) return '#e8a045';
  return '#e05252';
}

function priceClass(price) {
  if (!price) return '';
  if (price < 4) return 'green';
  if (price <= 6) return 'orange';
  return 'red';
}

// ── CUSTOM MARKER ──
function makeIcon(price) {
  const color = priceColor(price);
  const label = price ? `€${price.toFixed(1)}` : '?';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="52" height="32" viewBox="0 0 52 32">
    <rect x="1" y="1" width="50" height="24" rx="6" fill="${color}" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
    <text x="26" y="16" text-anchor="middle" dominant-baseline="middle" fill="#0e0e0f" font-family="DM Mono,monospace" font-weight="500" font-size="11">${label}</text>
    <polygon points="20,25 26,31 32,25" fill="${color}"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [52, 32],
    iconAnchor: [26, 32],
    popupAnchor: [0, -34]
  });
}

// ── LOAD DATA ──
async function loadData() {
  document.getElementById('loadingBar').classList.add('active');
  try {
    const { data: bars, error: barsErr } = await supabase
      .from('bars')
      .select('*, prices(price, called_at, source)')
      .order('name');

    if (barsErr) throw barsErr;

    allBars = bars.map(bar => {
      const prices = bar.prices || [];
      const latest = prices.sort((a, b) => new Date(b.called_at) - new Date(a.called_at))[0];
      return {
        ...bar,
        latestPrice: latest?.price || null,
        calledAt: latest?.called_at || null,
        source: latest?.source || null
      };
    });

    buildCityFilters();
    updateStats();
    applyFilters();
    setupRealtime();
  } catch (err) {
    console.error('Load error:', err);
    document.getElementById('barList').innerHTML =
      '<div class="no-results">Errore nel caricamento. Riprova più tardi.</div>';
  } finally {
    document.getElementById('loadingBar').classList.remove('active');
  }
}

// ── BUILD CITY FILTERS ──
function buildCityFilters() {
  const cities = [...new Set(allBars.map(b => b.city).filter(Boolean))].sort();
  const container = document.getElementById('cityFilters');
  container.innerHTML = `<button class="filter-btn active" data-city="all">Tutti</button>`;
  cities.forEach(city => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.city = city;
    btn.textContent = city;
    btn.onclick = () => setCity(city);
    container.appendChild(btn);
  });
  document.getElementById('totalCities').textContent = cities.length;
}

function setCity(city) {
  activeCity = city;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.city === city);
  });
  applyFilters();
}

// ── STATS ──
function updateStats() {
  const withPrice = allBars.filter(b => b.latestPrice);
  document.getElementById('totalBars').textContent = allBars.length;
  if (withPrice.length) {
    const avg = withPrice.reduce((s, b) => s + b.latestPrice, 0) / withPrice.length;
    document.getElementById('avgPrice').textContent = `€${avg.toFixed(2)}`;
  }
}

// ── FILTER + SORT ──
function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;

  filteredBars = allBars.filter(b => {
    const matchCity = activeCity === 'all' || b.city === activeCity;
    const matchSearch = !search || b.name.toLowerCase().includes(search) ||
      (b.city || '').toLowerCase().includes(search) ||
      (b.address || '').toLowerCase().includes(search);
    return matchCity && matchSearch;
  });

  filteredBars.sort((a, b) => {
    if (sort === 'price_asc') return (a.latestPrice || 99) - (b.latestPrice || 99);
    if (sort === 'price_desc') return (b.latestPrice || 0) - (a.latestPrice || 0);
    if (sort === 'name_asc') return a.name.localeCompare(b.name);
    if (sort === 'recent') return new Date(b.calledAt || 0) - new Date(a.calledAt || 0);
    return 0;
  });

  renderList();
  renderMarkers();
}

// ── RENDER LIST ──
function renderList() {
  const list = document.getElementById('barList');
  if (!filteredBars.length) {
    list.innerHTML = '<div class="no-results">Nessun bar trovato 🍊</div>';
    return;
  }

  list.innerHTML = filteredBars.map((bar, i) => {
    const pc = priceClass(bar.latestPrice);
    const priceLabel = bar.latestPrice ? `€${bar.latestPrice.toFixed(2)}` : '—';
    const meta = [bar.city, bar.calledAt ? new Date(bar.calledAt).toLocaleDateString('it-IT') : null]
      .filter(Boolean).join(' · ');
    return `
      <div class="bar-card ${bar.id === activeBarId ? 'active' : ''}"
           onclick="selectBar('${bar.id}')" data-id="${bar.id}">
        <div class="price-badge ${pc}">
          <div class="amount">${priceLabel}</div>
          <div class="unit">spritz</div>
        </div>
        <div class="bar-info">
          <div class="bar-name">${bar.name}</div>
          <div class="bar-meta">${meta}</div>
        </div>
        <div class="bar-rank">#${i + 1}</div>
      </div>`;
  }).join('');
}

// ── RENDER MARKERS ──
function renderMarkers() {
  // Remove old markers
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  filteredBars.forEach(bar => {
    if (!bar.latitude || !bar.longitude) return;
    const marker = L.marker([bar.latitude, bar.longitude], { icon: makeIcon(bar.latestPrice) });

    const calledDate = bar.calledAt
      ? new Date(bar.calledAt).toLocaleDateString('it-IT')
      : 'Non ancora chiamato';
    const srcLabel = bar.source === 'ai_call' ? '🤖 AI Call' :
                     bar.source === 'user_submit' ? '👤 Utente' : '📞 Chiamata';

    marker.bindPopup(`
      <div class="popup-inner">
        <div class="popup-name">${bar.name}</div>
        ${bar.latestPrice
          ? `<div class="popup-price ${priceClass(bar.latestPrice)}">€${bar.latestPrice.toFixed(2)}</div>`
          : `<div class="popup-price" style="color:var(--muted)">Prezzo non disponibile</div>`}
        <div class="popup-meta">${bar.city || ''} · ${calledDate}</div>
        ${bar.source ? `<div class="popup-source">${srcLabel}</div>` : ''}
      </div>
    `, { maxWidth: 260 });

    marker.on('click', () => selectBar(bar.id, false));
    marker.addTo(map);
    markers[bar.id] = marker;
  });
}

// ── SELECT BAR ──
function selectBar(id, flyTo = true) {
  activeBarId = id;
  const bar = allBars.find(b => b.id === id);
  if (!bar) return;

  // Update list highlight
  document.querySelectorAll('.bar-card').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  // Scroll into view
  const el = document.querySelector(`.bar-card[data-id="${id}"]`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // Fly to marker
  if (flyTo && bar.latitude && bar.longitude) {
    map.flyTo([bar.latitude, bar.longitude], 14, { duration: 1.2 });
  }

  // Open popup
  if (markers[id]) {
    markers[id].openPopup();
  }
}

// ── REALTIME ──
function setupRealtime() {
  db.channel('prices-changes')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'prices' }, payload => {
      const barId = payload.new.bar_id;
      const bar = allBars.find(b => b.id === barId);
      if (bar) {
        bar.latestPrice = payload.new.price;
        bar.calledAt = payload.new.called_at;
        bar.source = payload.new.source;
        updateStats();
        applyFilters();
      }
    })
    .subscribe();
}

// ── MODALS ──
function openModal(type) {
  document.getElementById(type + 'Modal').classList.add('open');
}

function closeModal(type) {
  document.getElementById(type + 'Modal').classList.remove('open');
}

// Close on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

// ── SUBMIT CONTRIBUTE ──
async function submitContribute() {
  const barName = document.getElementById('c_barName').value.trim();
  const city = document.getElementById('c_city').value;
  const price = parseFloat(document.getElementById('c_price').value);
  const address = document.getElementById('c_address').value.trim();

  if (!barName || !city || !price) {
    alert('Compila tutti i campi obbligatori (*)');
    return;
  }

  // Find or create bar
  let barId;
  const existing = allBars.find(b =>
    b.name.toLowerCase() === barName.toLowerCase() && b.city === city
  );

  if (existing) {
    barId = existing.id;
  } else {
    const { data, error } = await db.channel('bars').insert({
      name: barName, city, address, source: 'user_submit'
    }).select().single();
    if (error) { alert('Errore. Riprova.'); return; }
    barId = data.id;
    allBars.push({ ...data, latestPrice: null, prices: [] });
  }

  const { error } = await db.channel('prices').insert({
    bar_id: barId,
    price,
    source: 'user_submit'
  });

  if (error) { alert('Errore nel salvataggio.'); return; }

  document.getElementById('c_success').style.display = 'block';
  setTimeout(() => closeModal('contribute'), 2000);
}

// ── SUBMIT CLAIM ──
async function submitClaim() {
  const barName = document.getElementById('cl_barName').value.trim();
  const ownerName = document.getElementById('cl_ownerName').value.trim();
  const email = document.getElementById('cl_email').value.trim();

  if (!barName || !ownerName || !email) {
    alert('Compila tutti i campi obbligatori (*)');
    return;
  }

  const { error } = await db.channel('claims').insert({
    bar_name: barName,
    owner_name: ownerName,
    email,
    phone: document.getElementById('cl_phone').value.trim(),
    message: document.getElementById('cl_message').value.trim()
  });

  if (error) {
    // Table might not exist yet - show success anyway
    console.warn('Claims table error:', error.message);
  }

  document.getElementById('cl_success').style.display = 'block';
  setTimeout(() => closeModal('claim'), 2000);
}

// ── EVENT LISTENERS ──
document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('sortSelect').addEventListener('change', applyFilters);
document.querySelector('[data-city="all"]').addEventListener('click', () => setCity('all'));

// ── START ──
initMap();
loadData();
</script>
